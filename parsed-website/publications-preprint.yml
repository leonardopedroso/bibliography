- citation: "L. Pedroso, W.P.M.H. Heemels and P. Batista, <b>'A Unified Family-optimal Solution to Covariance Intersection Problems with Semidefinite Programming'</b>, <i>arXiv preprint arXiv:2603.20402</i>, 2026. doi: 10.48550/arXiv.2603.20402."
  url: https://arxiv.org/abs/2603.20402
  abstract: "Covariance intersection (CI) methods provide a principled approach to fusing estimates with unknown cross-correlations by minimizing a worst-case measure of uncertainty that is consistent with the available information. This paper introduces a generalized CI framework, called overlapping covariance intersection (OCI), which unifies several existing CI formulations within a single optimization-based framework. This unification enables the characterization of family-optimal solutions for multiple CI variants, including standard CI and split covariance intersection (SCI), as solutions to a semidefinite program, for which efficient off-the-shelf solvers are available. When specialized to the corresponding settings, the proposed family-optimal solutions recover the state-of-the-art family-optimal solutions previously reported for CI and SCI. The resulting formulation facilitates the systematic design and real-time implementation of CI-based fusion methods in large-scale distributed estimation problems, such as cooperative localization."
  pdf: https://arxiv.org/pdf/2603.20402
  github: https://github.com/decenter2021/https://github.com/decenter2021/unification-CI
  bibtex: "@misc{PedrosoBatistaEtAl2026UnificationCI,<br>author = {L. Pedroso and W. P. M. H. Heemels and P. Batista},<br>title = {A Unified Family-optimal Solution to Covariance Intersection Problems with Semidefinite Programming},<br>note = {arXiv preprint arXiv:2603.20402},<br>year = {2026},<br>doi = {10.48550/arXiv.2603.20402}<br>}"


- citation: "L. Pedroso, P. Batista and W.P.M.H. Heemels, <b>'Overlapping Covariance Intersection: Fusion with Partial Structural Knowledge of Correlation from Multiple Sources'</b>, <i>arXiv preprint arXiv:2603.16768</i>, 2026. doi: 10.48550/arXiv.2603.16768."
  url: https://arxiv.org/abs/2603.16768
  abstract: "Emerging large-scale engineering systems rely on distributed fusion for situational awareness, where agents combine noisy local sensor measurements with exchanged information to obtain fused estimates. However, at the sheer scale of these systems, tracking cross-correlations becomes infeasible, preventing the use of optimal filters. Covariance intersection (CI) methods address fusion problems with unknown correlations by minimizing worst-case uncertainty based on available information. Existing CI extensions exploit limited correlation knowledge but cannot incorporate structural knowledge of correlation from multiple sources, which naturally arises in distributed fusion problems. This paper introduces Overlapping Covariance Intersection (OCI), a generalized CI framework that accommodates this novel information structure. We formalize the OCI problem and establish necessary and sufficient conditions for feasibility. We show that a family-optimal solution can be computed efficiently via semidefinite programming, enabling real-time implementation. The proposed tools enable improved fusion performance for large-scale systems while retaining robustness to unknown correlations."
  pdf: https://arxiv.org/pdf/2603.16768
  github: https://github.com/decenter2021/OCI
  bibtex: "@misc{PedrosoBatistaEtAl2026OCI,<br>author = {L. Pedroso and P. Batista and W. P. M. H. Heemels},<br>title = {Overlapping Covariance Intersection: Fusion with Partial Structural Knowledge of Correlation from Multiple Sources},<br>note = {arXiv preprint arXiv:2603.16768},<br>year = {2026},<br>doi = {10.48550/arXiv.2603.16768}<br>}"


- citation: "L. Pedroso, A. Agazzi, W.P.M.H. Heemels and M. Salazar, <b>'Token Economy for Fair and Efficient Dynamic Resource Allocation in Congestion Games'</b>, <i>arXiv preprint arXiv:2603.18094</i>, 2026. doi: 10.48550/arXiv.2603.18094."
  url: https://arxiv.org/abs/2603.18094
  abstract: "Self-interested behavior in sharing economies often leads to inefficient aggregate outcomes compared to a centrally coordinated allocation, ultimately harming users. Yet, centralized coordination removes individual decision power. This issue can be addressed by designing rules that align individual preferences with system-level objectives. Unfortunately, rules based on conventional monetary mechanisms introduce unfairness by discriminating among users based on their wealth. To solve this problem, in this paper, we propose a token-based mechanism for congestion games that achieves efficient and fair dynamic resource allocation. Specifically, we model the token economy as a continuous-time dynamic game with finitely many boundedly rational agents, explicitly capturing their evolutionary policy-revision dynamics. We derive a mean-field approximation of the finite-population game and establish strong approximation guarantees between the mean-field and the finite-population games. This approximation enables the design of integer tolls in closed form that provably steer the aggregate dynamics toward an optimal efficient and fair allocation from any initial condition."
  pdf: https://arxiv.org/pdf/2603.18094
  github: https://github.com/fish-tue/token-economy
  bibtex: "@misc{PedrosoAgazziEtAl2026TokenEconomy,<br>author = {L. Pedroso and A. Agazzi and W. P. M. H. Heemels and M. Salazar},<br>title = {Token Economy for Fair and Efficient Dynamic Resource Allocation in Congestion Games},<br>note = {arXiv preprint arXiv:2603.18094},<br>year = {2026},<br>doi = {10.48550/arXiv.2603.18094}<br>}"


- citation: "L. Pedroso, A. Agazzi, W.P.M.H. Heemels and M. Salazar, <b>'Evolutionary Dynamics in Continuous-time Finite-state Mean Field Games - Part II: Stability'</b>, <i>arXiv preprint arXiv:2511.03297</i>, 2025. doi: 10.48550/arXiv.2511.03297."
  url: https://arxiv.org/abs/2511.03297
  abstract: "We study a dynamic game with a large population of players who choose actions from a finite set in continuous time. Each player has a state in a finite state space that evolves stochastically with their actions. A player's reward depends not only on their own state and action but also on the distribution of states and actions across the population, capturing effects such as congestion in traffic networks. In Part I, we introduced an evolutionary model and a new solution concept - the mixed stationary Nash Equilibrium (MSNE) - which coincides with the rest points of the mean field evolutionary model under meaningful families of revision protocols. In this second part, we investigate the evolutionary stability of MSNE. We derive conditions on both the structure of the MSNE and the game’s payoff map that ensure local and global stability under evolutionary dynamics. These results characterize when MSNE can robustly emerge and persist against strategic deviations, thereby providing insight into its long-term viability in large population dynamic games."
  pdf: https://arxiv.org/pdf/2511.03297
  github: https://github.com/fish-tue/evolutionary-mfg-avg
  bibtex: "@misc{PedrosoAgazziEtAl2025MFGAvgII,<br>author = {L. Pedroso and A. Agazzi and W. P. M. H. Heemels and M. Salazar},<br>title = {Evolutionary Dynamics in Continuous-time Finite-state Mean Field Games - {Part II}: Stability},<br>note = {arXiv preprint arXiv:2511.03297},<br>year = {2025},<br>doi = {10.48550/arXiv.2511.03297}<br>}"


- citation: "L. Pedroso, A. Agazzi, W.P.M.H. Heemels and M. Salazar, <b>'Evolutionary Dynamics in Continuous-time Finite-state Mean Field Games - Part I: Equilibria'</b>, <i>arXiv preprint arXiv:2511.01452</i>, 2025. doi: 10.48550/arXiv.2511.01452."
  url: https://arxiv.org/abs/2511.01452
  abstract: "We study a dynamic game with a large population of players who choose actions from a finite set in continuous time. Each player has a state in a finite state space that evolves stochastically with their actions. A player's reward depends not only on their own state and action but also on the distribution of states and actions across the population, capturing effects such as congestion in traffic networks. While prior work in evolutionary game theory has primarily focused on static games without individual player state dynamics, we present the first comprehensive evolutionary analysis of such dynamic games. We propose an evolutionary model together with a mean field approximation of the finite-population game and establish strong approximation guarantees. We show that standard solution concepts for dynamic games lack an evolutionary interpretation, and we propose a new concept - the Mixed Stationary Nash Equilibrium (MSNE) - which admits one. We analyze the relationship between MSNE and the rest points of the mean field evolutionary model and study the evolutionary stability of MSNE."
  pdf: https://arxiv.org/pdf/2511.01452
  github: https://github.com/fish-tue/evolutionary-mfg-avg
  bibtex: "@misc{PedrosoAgazziEtAl2025MFGAvg,<br>author = {L. Pedroso and A. Agazzi and W. P. M. H. Heemels and M. Salazar},<br>title = {Evolutionary Dynamics in Continuous-time Finite-state Mean Field Games - {Part I}: Equilibria},<br>note = {arXiv preprint arXiv:2511.01452},<br>year = {2025},<br>doi = {10.48550/arXiv.2511.01452}<br>}"


